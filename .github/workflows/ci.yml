name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  unix-matrix:
    name: unix-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Install tmux on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux

      - name: Install tmux on macOS
        if: runner.os == 'macOS'
        run: brew install tmux

      - name: Install Zellij
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ZELLIJ_BIN_DIR="$(python .github/scripts/install_zellij.py --out "$RUNNER_TEMP/zellij-bin")"
          echo "$ZELLIJ_BIN_DIR" >> "$GITHUB_PATH"

      - name: Print tool versions
        shell: bash
        run: |
          rustc --version
          cargo --version
          node --version
          tmux -V
          zellij --version

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features

      - name: Nextest
        run: cargo nextest run --profile ci --workspace

  windows-v1:
    name: windows-v1
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Install Zellij
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $binDir = python .github/scripts/install_zellij.py --out "$env:RUNNER_TEMP\zellij-bin"
          $binDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Print tool versions
        shell: pwsh
        run: |
          rustc --version
          cargo --version
          node --version
          zellij --version

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features

      - name: Nextest
        run: >
          cargo nextest run
          --profile ci
          -p terminal-backend-native
          -p terminal-daemon
          -p terminal-daemon-client
          -p terminal-node
          -p terminal-node-napi
          -p terminal-protocol
          -p terminal-testing

  governance:
    name: governance
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.4,cargo-public-api@0.51.0,cargo-semver-checks@0.47.0,release-plz@0.3.157

      - name: Format
        run: cargo fmt --all --check

      - name: cargo-deny
        run: cargo deny check bans licenses advisories sources

      - name: Install nightly for cargo-public-api
        run: rustup toolchain install nightly --profile minimal

      - name: cargo-public-api
        run: |
          cargo public-api -p terminal-domain > /dev/null
          cargo public-api -p terminal-protocol > /dev/null
          cargo public-api -p terminal-node > /dev/null

      - name: release-plz config smoke
        run: release-plz --version

      - name: cargo-semver-checks
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          cargo semver-checks check-release -p terminal-domain --baseline-rev "$BASE_SHA"
          cargo semver-checks check-release -p terminal-protocol --baseline-rev "$BASE_SHA"
          cargo semver-checks check-release -p terminal-node --baseline-rev "$BASE_SHA"

  fuzz-baseline:
    name: fuzz-baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz@0.13.1

      - name: Run fuzz baseline
        run: |
          cargo +nightly fuzz run --fuzz-dir fuzz --target x86_64-unknown-linux-gnu protocol_frames -- -max_total_time=2
          cargo +nightly fuzz run --fuzz-dir fuzz --target x86_64-unknown-linux-gnu tmux_layout -- -max_total_time=2
          cargo +nightly fuzz run --fuzz-dir fuzz --target x86_64-unknown-linux-gnu zellij_surface -- -max_total_time=2
          cargo +nightly fuzz run --fuzz-dir fuzz --target x86_64-unknown-linux-gnu screen_delta -- -max_total_time=2
