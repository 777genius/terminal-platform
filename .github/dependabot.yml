version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - area:ci
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - area:ci
  - package-ecosystem: npm
    directory: /crates/terminal-node-napi/package
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - host:node-electron
