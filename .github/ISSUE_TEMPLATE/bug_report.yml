name: Bug report
description: Report a runtime, host integration, or packaging bug
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Short description of the bug.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Native runtime
        - tmux adapter
        - Zellij adapter
        - Daemon or transport
        - Node or Electron package
        - C ABI
        - CI or packaging
        - Documentation
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15.4, Ubuntu 24.04, Windows 11 24H2
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Relevant versions
      description: Include Rust, Node, tmux, or Zellij versions if relevant
      placeholder: rustc 1.90.0, node v20.19.0, zellij 0.44.1
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add logs, stack traces, or screenshots if they help
